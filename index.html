<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-44Y79JKSM4"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-44Y79JKSM4');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>HK Tech Price - 真實零件行情</title>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { padding-bottom: 100px; }
    </style>
</head>
<body class="bg-gray-100 p-4 font-sans text-gray-900">
    <div class="max-w-4xl mx-auto">
        <div class="sticky top-0 bg-white shadow-lg rounded-t-xl p-4 z-20">
            <div class="flex gap-2 items-center mb-4">
                <input type="text" id="searchInput" onkeyup="filterAll()" 
                       placeholder="搜尋型號、品牌..." 
                       class="flex-1 border-2 border-blue-500 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-300">
                
                <button onclick="toggleSort()" class="bg-gray-800 text-white p-2 rounded-lg hover:bg-gray-700 transition-all flex items-center justify-center w-10 h-10 shadow-md active:scale-90">
                    <span id="sortIcon">⇅</span>
                </button>
            </div>
            
            <div id="categoryBar" class="flex gap-2 overflow-x-auto pb-2 text-sm no-scrollbar">
                <button data-cat="All" onclick="setCategory('All')" class="cat-btn bg-blue-600 text-white px-4 py-1.5 rounded-full whitespace-nowrap shadow-sm">全部</button>
                <button data-cat="GPU" onclick="setCategory('GPU')" class="cat-btn bg-gray-200 hover:bg-gray-300 px-4 py-1.5 rounded-full whitespace-nowrap">顯示卡 (GPU)</button>
                <button data-cat="CPU" onclick="setCategory('CPU')" class="cat-btn bg-gray-200 hover:bg-gray-300 px-4 py-1.5 rounded-full whitespace-nowrap">處理器 (CPU)</button>
                <button data-cat="RAM" onclick="setCategory('RAM')" class="cat-btn bg-gray-200 hover:bg-gray-300 px-4 py-1.5 rounded-full whitespace-nowrap">內存 (RAM)</button>
                <button data-cat="MB" onclick="setCategory('MB')" class="cat-btn bg-gray-200 hover:bg-gray-300 px-4 py-1.5 rounded-full whitespace-nowrap">主機板</button>
                <button data-cat="SSD" onclick="setCategory('SSD')" class="cat-btn bg-gray-200 hover:bg-gray-300 px-4 py-1.5 rounded-full whitespace-nowrap">儲存 (SSD)</button>
            </div>
        </div>

        <div id="productContainer" class="bg-white divide-y divide-gray-100 rounded-b-xl overflow-hidden shadow-md"></div>

        <div id="noResult" class="hidden p-20 text-center text-gray-400 bg-white rounded-b-xl shadow-md">
            找不到相關零件。
        </div>
    </div>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-30">
        <a href="mailto:240092885ccc@gmail.com" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-full shadow-2xl font-bold flex items-center gap-2 transition-transform hover:scale-105 active:scale-95">
            <span>聯絡我 Contact Me</span>
        </a>
    </div>

    <script>
        let currentCategory = 'All';
        let sortOrder = 'none';

        const products = [
            { brand: 'Intel', category: 'CPU', model: 'Core i9-14900K', spec: '24C/32T / Up to 6.0GHz', price: 4480, shop: '正都', type: '行貨', time: '5m' },
            { brand: 'AMD', category: 'CPU', model: 'Ryzen 7 7800X3D', spec: '8C/16T / L3 96MB Cache', price: 2950, shop: '中田', type: '行貨', time: '12m' },
            { brand: 'NVIDIA', category: 'GPU', model: 'RTX 4090 Founders Edition', spec: '24GB GDDR6X', price: 14500, shop: '黃金小店', type: '水貨', time: '1h' },
            { brand: 'ASUS', category: 'GPU', model: 'ROG Strix RTX 4080 Super', spec: '16GB GDDR6X White Edition', price: 9880, shop: 'SE Computer', type: '行貨', time: '20m' },
            { brand: 'MSI', category: 'MB', model: 'MPG Z790 CARBON WIFI', spec: 'LGA 1700 / DDR5 / PCIe 5.0', price: 3150, shop: '法奧', type: '行貨', time: '30m' },
            { brand: 'Gigabyte', category: 'MB', model: 'B650 AORUS ELITE AX', spec: 'AM5 / DDR5 / ATX', price: 1650, shop: '正都', type: '行貨', time: '45m' },
            { brand: 'Samsung', category: 'SSD', model: '990 PRO 2TB', spec: 'M.2 NVMe PCIe 4.0 / 7450MB/s', price: 1320, shop: 'Jumbo', type: '行貨', time: '1h' },
            { brand: 'Corsair', category: 'RAM', model: 'Vengeance RGB 64GB Kit', spec: '2x32GB / DDR5-6000 CL30', price: 1780, shop: '飛馬', type: '行貨', time: '2h' },
            { brand: 'G.Skill', category: 'RAM', model: 'Trident Z5 Neo RGB 32GB', spec: '2x16GB / DDR5-6400 CL32', price: 990, shop: '首選', type: '行貨', time: '3h' },
            { brand: 'WD', category: 'SSD', model: 'Black SN850X 4TB', spec: 'M.2 NVMe / w/ Heatsink', price: 2550, shop: '黃金地庫', type: '水貨', time: '4h' },
            { brand: 'Intel', category: 'CPU', model: 'Core i5-14600K', spec: '14C/20T / Up to 5.3GHz', price: 2380, shop: '中田', type: '行貨', time: '5h' },
            { brand: 'AMD', category: 'CPU', model: 'Ryzen 5 7600X', spec: '6C/12T / Up to 5.3GHz', price: 1680, shop: '法奧', type: '行貨', time: '6h' },
            { brand: 'ASUS', category: 'MB', model: 'TUF Gaming B760M-PLUS', spec: 'LGA 1700 / Micro-ATX', price: 1250, shop: '正都', type: '行貨', time: '7h' },
            { brand: 'Zotac', category: 'GPU', model: 'RTX 4070 Ti Super Trinity', spec: '16GB GDDR6X', price: 6350, shop: '科訊', type: '行貨', time: '8h' },
            { brand: 'Kingston', category: 'RAM', model: 'Fury Renegade 32GB', spec: 'DDR5-7200 CL34', price: 1150, shop: '金昇', type: '行貨', time: '9h' },
            { brand: 'Crucial', category: 'SSD', model: 'T705 2TB Gen5 SSD', spec: '14500MB/s / PCIe 5.0', price: 2850, shop: 'Jumbo', type: '行貨', time: '10h' },
            { brand: 'ASRock', category: 'MB', model: 'Z790 Taichi Lite', spec: '24 Phase VRM / DDR5', price: 2480, shop: '首選', type: '行貨', time: '11h' },
            { brand: 'Sapphire', category: 'GPU', model: 'RX 7900 XTX Nitro+', spec: '24GB GDDR6 / Vapor-X', price: 7999, shop: '中田', type: '行貨', time: '12h' },
            { brand: 'Corsair', category: 'SSD', model: 'MP600 ELITE 2TB', spec: '7000MB/s / PCIe 4.0', price: 1180, shop: '飛馬', type: '行貨', time: '13h' },
            { brand: 'AMD', category: 'CPU', model: 'Ryzen 9 7950X3D', spec: '16C/32T / L3 128MB', price: 4650, shop: '正都', type: '行貨', time: '14h' }
        ];

        function render(data) {
            const container = document.getElementById('productContainer');
            const noResult = document.getElementById('noResult');
            
            if (data.length === 0) {
                container.innerHTML = '';
                noResult.classList.remove('hidden');
                return;
            }
            
            noResult.classList.add('hidden');
            container.innerHTML = data.map(p => `
                <div class="p-4 hover:bg-blue-50 flex justify-between items-center transition-all border-b border-gray-50">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 text-[10px] mb-1 font-bold uppercase">
                            <span class="text-blue-500 font-mono">${p.brand}</span>
                            <span class="${p.type === '水貨' ? 'text-orange-500 border-orange-500' : 'text-green-600 border-green-600'} border px-1 rounded">${p.type}</span>
                            <span class="bg-gray-100 text-gray-500 px-1 rounded">${p.category}</span>
                        </div>
                        <h3 class="font-black text-gray-800 text-sm md:text-lg leading-tight">${p.model}</h3>
                        <p class="text-xs text-gray-500 mt-1">${p.spec}</p>
                    </div>
                    <div class="text-right ml-4">
                        <div class="text-xl font-black text-blue-600 font-mono italic">$${p.price.toLocaleString()}</div>
                        <div class="text-[10px] text-gray-400 font-medium">${p.shop} · ${p.time}前</div>
                    </div>
                </div>
            `).join('');
        }

        // 更新 URL 參數的核心函數
        function updateURL(params) {
            const url = new URL(window.location);
            Object.keys(params).forEach(key => {
                if (params[key] === 'All' || params[key] === 'none') {
                    url.searchParams.delete(key);
                } else {
                    url.searchParams.set(key, params[key]);
                }
            });
            history.pushState({}, '', url);
        }

        function setCategory(cat) {
            currentCategory = cat;
            
            // UI 更新
            document.querySelectorAll('.cat-btn').forEach(b => {
                const isMatch = b.getAttribute('data-cat') === cat;
                b.classList.toggle('bg-blue-600', isMatch);
                b.classList.toggle('text-white', isMatch);
                b.classList.toggle('bg-gray-200', !isMatch);
                b.classList.toggle('text-gray-700', !isMatch);
            });

            updateURL({ cat: cat });
            filterAll();
        }

        function toggleSort() {
            // 切換狀態: none -> desc -> asc -> none
            if (sortOrder === 'none') sortOrder = 'desc';
            else if (sortOrder === 'desc') sortOrder = 'asc';
            else sortOrder = 'none';

            // 更新按鈕圖示
            const icon = document.getElementById('sortIcon');
            if (sortOrder === 'desc') icon.innerText = '▼';
            else if (sortOrder === 'asc') icon.innerText = '▲';
            else icon.innerText = '⇅';

            updateURL({ sort: sortOrder });
            filterAll();
        }

        function filterAll() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let filtered = products.filter(p => {
                const matchCategory = (currentCategory === 'All' || p.category === currentCategory);
                const matchSearch = (p.model.toLowerCase().includes(searchTerm) || p.brand.toLowerCase().includes(searchTerm));
                return matchCategory && matchSearch;
            });

            // 排序邏輯
            if (sortOrder === 'desc') filtered.sort((a, b) => b.price - a.price);
            else if (sortOrder === 'asc') filtered.sort((a, b) => a.price - b.price);
            
            render(filtered);
        }

        // 頁面初次加載：從 URL 讀取狀態
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            
            // 讀取分類
            const cat = urlParams.get('cat') || 'All';
            setCategory(cat);

            // 讀取排序
            const sort = urlParams.get('sort') || 'none';
            sortOrder = sort;
            const icon = document.getElementById('sortIcon');
            if (sortOrder === 'desc') icon.innerText = '▼';
            else if (sortOrder === 'asc') icon.innerText = '▲';
            
            filterAll();
        };

        // 支援瀏覽器上一頁/下一頁
        window.onpopstate = () => location.reload();
    </script>
</body>
</html>
